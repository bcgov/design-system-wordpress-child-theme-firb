name: Visual Regression Tests

on:
  pull_request:
    branches:
      - main
      - release/*
  workflow_dispatch:

jobs:
  visual-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start WordPress environment
        run: npm run wp-env start
        env:
          WP_ENV_PORT: 8888

      - name: Wait for WordPress
        run: |
          timeout 300 bash -c 'until curl -f http://localhost:8888/wp-admin/install.php; do sleep 2; done'

      - name: Run screenshot tests
        run: npm run test:screenshot

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: tests/screenshot/__snapshots__/
          retention-days: 30

      - name: Commit screenshots
        if: github.event_name == 'pull_request'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tests/screenshot/__snapshots__/
          git diff --staged --quiet || git commit -m "Update visual regression screenshots [skip ci]"
          git push || echo "No changes to commit"
